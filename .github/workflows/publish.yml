name: Publish wheels to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
          - name: macos-x86_64
            os: macos-15-intel
            mac_arch: x86_64
            mac_target: "13.0"
          - name: macos-arm64
            os: macos-14
            mac_arch: arm64
            mac_target: "13.0"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python (runner only)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install build tools
        run: python -m pip install --upgrade pip "cibuildwheel==3.4.0" "delvewheel>=1.12.0"

      - name: macOS build deps
        if: startsWith(matrix.os, 'macos')
        run: |
          brew update
          brew install armadillo
          echo "ARMADILLO_INCLUDE_DIR=$(brew --prefix armadillo)/include" >> $GITHUB_ENV

      - name: Windows deps (vcpkg)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg.exe install armadillo

      - name: Build wheels
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: >
            pp*
            *musllinux*
            *i686*
            *win32*
            cp313-macosx_x86_64

          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_BEFORE_ALL_LINUX: "yum install -y armadillo-devel"

          CIBW_ARCHS_MACOS: ${{ matrix.mac_arch }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.mac_target }}

          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair --add-path C:\\vcpkg\\installed\\x64-windows\\bin -w {dest_dir} {wheel}"

          CIBW_TEST_COMMAND: "python -c \"import spheroids; print('import ok')\""
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl
          retention-days: 14

  publish:
    name: Publish to PyPI
    needs: build_wheels
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}