name: Build wheels

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
          - name: macos-x86_64
            os: macos-13
            mac_arch: x86_64
            mac_target: "11.0"
          - name: macos-arm64
            os: macos-14
            mac_arch: arm64
            mac_target: "11.0"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python (runner only)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip "cibuildwheel==2.21.0"

      - name: macOS deps (Homebrew)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew update
          brew install armadillo libomp

      - name: Windows deps (vcpkg)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg.exe install armadillo

      - name: Build wheels
        env:
          # choose your support window; matches what you currently publish on PyPI
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "pp* *musllinux* *i686* *win32*"

          # Linux: runs inside manylinux container
          CIBW_BEFORE_BUILD_LINUX: "yum install -y armadillo-devel"

          # macOS split by runner
          CIBW_ARCHS_MACOS: ${{ matrix.mac_arch }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.mac_target }}

          # sanity test (keep it simple)
          CIBW_TEST_COMMAND: >
            python -c "import spheroids; print('import ok')"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}